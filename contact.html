<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Wanderlust Guides</title>
    <link rel="stylesheet" href="travel_recommendation_style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">🎒 Wanderlust</div>
        <ul class="nav-links">
            <li><a href="travel_recommendation.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" class="active">Contact Us</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="contact-box">
            <h2>Get In Touch</h2>
            <form id="contactForm" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </section>
    </main>
</body>
</html>
